{% extends "base.html" %}

{% block title %}Clasificación{% endblock %}

{% block content %}


<div class="clas-wrapper " id="bloque-equipos">
    <h2 class="clas-titulo">
        🏆 Clasificación de Equipos
    </h2>
   
    
    <p class="clas-subtitulo">Suma de las puntuaciones de los alumnos en cada fase.</p>

    <div class="clas-controles">
        <span class="clas-mostrar-label">Mostrar:</span>
        <select class="clas-select" id="filtro-colegio">
            <option value="">— Elige un colegio —</option>
        </select>
        <button class="clas-btn" onclick="descargarExcel()">⬇ Descargar Excel</button>
    </div>

    <div id="clas-lista"></div>
</div>




<div class="clas-wrapper"
     id="bloque-oradores">

    <h2 class="clas-titulo">
        🎤 Clasificación de Oradores
    </h2>

    <p class="clas-subtitulo">
        Ranking individual por puntos acumulados.
    </p>

    <div id="clas-oradores"></div>

</div>

<script>
let statsGlobal = [];

async function cargarClasificacion() {
    const [resStats, resEquipos] = await Promise.all([
        fetch('/clasificacion/datos'),
        fetch('/equipos/datos')
    ]);
    statsGlobal = await resStats.json();
    const equipos = await resEquipos.json();

    const centros = [...new Set(equipos.map(e => e.colegio).filter(Boolean))].sort();
    const sel = document.getElementById('filtro-colegio');
    centros.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        sel.appendChild(opt);
    });

    renderClasificacion(statsGlobal);
    
}

const NEON = ['#00eeff', '#0077ff', '#4433ff'];
const NEON_TEXT = ['#0d1b2a', '#ffffff', '#ffffff'];

function renderClasificacion(stats) {
    const lista = document.getElementById('clas-lista');
    if (!stats.length) {
        lista.innerHTML = '<p class="clas-vacio">No hay equipos registrados.</p>';
        return;
    }
    lista.innerHTML = stats.map((e, i) => {
        const neon = i < 3 ? NEON[i] : '#3a5570';
        const esNeon = i < 3;
        return `
        <div class="clas-fila ${esNeon ? 'clas-fila-neon' : ''}" style="border-left-color:${neon};">
            <div class="clas-pos" style="${esNeon ? `background:${neon};color:${NEON_TEXT[i]}` : 'background:#3a5570;color:#aac'}">${i + 1}º</div>
            <div class="clas-info">
                <div class="clas-nombre">${e.colegio}</div>
                <div class="clas-sub">
                    Debates: ${e.pj} ·
                    Ganados: ${e.pg} ·
                    Perdidos: ${e.pp}
                </div>
            </div>
            <div class="clas-pts" style="${esNeon ? `background:${neon};color:${NEON_TEXT[i]}` : 'background:#3a5570;color:#ccd'}">${e.pts.toFixed(1)} pts</div>
        </div>`;
    }).join('');
}



document.getElementById('filtro-colegio').addEventListener('change', e => {
    const val = e.target.value;
    renderClasificacion(val ? statsGlobal.filter(eq => eq.colegio.includes(val) || (eq.centro || '').includes(val)) : statsGlobal);
});

function descargarExcel() {
    const filas = [['Posición', 'Equipo', 'PJ', 'PG', 'PP', 'Puntos']];
    statsGlobal.forEach((e, i) => {
        filas.push([i + 1, e.colegio, e.pj, e.pg, e.pp, e.pts.toFixed(1)]);
    });
    const csv = filas.map(f => f.map(v => `"${v}"`).join(',')).join('\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'clasificacion.csv';
    a.click();
}

async function cargarOradores() {

    const res = await fetch('/clasificacion/oradores');
    const oradores = await res.json();

    const div = document.getElementById('clas-oradores');

    if (!oradores.length) {

        div.innerHTML =
            '<p class="clas-vacio">No hay puntuaciones registradas.</p>';

        return;
    }

    div.innerHTML = `
        <table class="clas-tabla">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Orador</th>
                    <th>Equipo</th>
                    <th>Puntos</th>
                </tr>
            </thead>

            <tbody>
                ${oradores.map((o, i) => `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${o.nombre}</td>
                        <td>${o.equipo}</td>
                        <td><strong>${o.puntos.toFixed(1)}</strong></td>
                    </tr>
                `).join('')}
            </tbody>

        </table>
    `;
}


cargarClasificacion();
cargarOradores();
</script>

{% endblock %}
