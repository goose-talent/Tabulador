{% extends "base.html" %}

{% block title %}Equipos{% endblock %}

{% block content %}

<div class="contenedor-principal">
    <section class="tarjeta">
        <h2>Equipos del torneo</h2>
        <p class="ayuda">Cada equipo tiene que ser del curso de 5.º o 6.º</p>

        <form id="form-equipo" class="form-equipo">
            <div class="campo">
                <label for="equipo-nombre">Nombre del equipo / colegio</label>
                <input type="text" id="equipo-nombre" list="colegios-list" required placeholder="Escribe el nombre del colegio">
                <datalist id="colegios-list"></datalist>
            </div>
            <div class="alumnos-grid">
                <div class="campo">
                    <label>Alumno 1</label>
                    <input type="text" class="alumno-input" data-idx="0" required placeholder="Nombre y apellido">
                </div>
                <div class="campo">
                    <label>Alumno 2</label>
                    <input type="text" class="alumno-input" data-idx="1" required placeholder="Nombre y apellido">
                </div>
                <div class="campo">
                    <label>Alumno 3</label>
                    <input type="text" class="alumno-input" data-idx="2" required placeholder="Nombre y apellido">
                </div>
                <div class="campo">
                    <label>Alumno 4 <span class="alumno-opcional">opcional</span></label>
                    <input type="text" class="alumno-input" data-idx="3" placeholder="Nombre y apellido">
                </div>
                <div class="campo">
                    <label>Alumno 5 <span class="alumno-opcional">opcional</span></label>
                    <input type="text" class="alumno-input" data-idx="4" placeholder="Nombre y apellido">
                </div>
                <div class="campo">
                    <label>Alumno 6 <span class="alumno-opcional">opcional</span></label>
                    <input type="text" class="alumno-input" data-idx="5" placeholder="Nombre y apellido">
                </div>
            </div>
            <div class="sala-selector-row">
                <div class="campo sala-selector-campo">
                    <label for="equipo-sala">Sala</label>
                    <select id="equipo-sala">
                        <option value="">— Elige una sala —</option>
                        <option value="Auditorio">Auditorio</option>
                        <option value="Ludoteca">Ludoteca</option>
                        <option value="Poli 2">Poli 2</option>
                    </select>
                </div>
                <div class="sala-contadores">
                    <div class="sala-contador" id="contador-auditorio">
                        <span class="sala-contador-nombre">Auditorio</span>
                        <span class="sala-contador-num" id="num-auditorio">0</span>
                    </div>
                    <div class="sala-contador" id="contador-ludoteca">
                        <span class="sala-contador-nombre">Ludoteca</span>
                        <span class="sala-contador-num" id="num-ludoteca">0</span>
                    </div>
                    <div class="sala-contador" id="contador-poli2">
                        <span class="sala-contador-nombre">Poli 2</span>
                        <span class="sala-contador-num" id="num-poli2">0</span>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primario">Añadir equipo</button>
        </form>

        <div class="csv-zona">
            <span class="csv-zona-texto">¿Tienes los datos en Excel?</span>
            <label for="input-csv" class="btn-csv">Adjuntar CSV</label>
            <input type="file" id="input-csv" accept=".csv" style="display:none;">
            <button type="button" class="btn-plantilla" onclick="descargarPlantilla()">Descargar plantilla</button>
            <span id="csv-mensaje" class="csv-mensaje"></span>
        </div>

        <div id="equipos-lista" class="equipos-lista"></div>
    </section>
</div>

<script>
async function cargarEquipos() {
    const res = await fetch('/equipos/datos');
    const equipos = await res.json();
    renderizarEquipos(equipos);
    actualizarContadores(equipos);
    actualizarSugerencias(equipos);
}

function renderizarEquipos(equipos) {
    const lista = document.getElementById('equipos-lista');
    if (!equipos.length) { lista.innerHTML = ''; return; }
    lista.innerHTML = equipos.map(e => `
        <div class="equipo-item">
            <div class="equipo-cabecera">
                <span class="equipo-nombre">${e.colegio}</span>
                <span class="equipo-sala-chip">${e.sala || '—'}</span>
            </div>
            <div class="equipo-alumnos">${e.alumnos.join(' · ')}</div>
        </div>
    `).join('');
}

function actualizarContadores(equipos) {
    const c = { Auditorio: 0, Ludoteca: 0, 'Poli 2': 0 };
    equipos.forEach(e => { if (c[e.sala] !== undefined) c[e.sala]++; });
    document.getElementById('num-auditorio').textContent = c.Auditorio;
    document.getElementById('num-ludoteca').textContent = c.Ludoteca;
    document.getElementById('num-poli2').textContent = c['Poli 2'];
}

function actualizarSugerencias(equipos) {
    const dl = document.getElementById('colegios-list');
    const vistos = new Set(equipos.map(e => e.colegio));
    dl.innerHTML = [...vistos].map(c => `<option value="${c}">`).join('');
}

document.getElementById('form-equipo').addEventListener('submit', async e => {
    e.preventDefault();
    const colegio = document.getElementById('equipo-nombre').value.trim();
    const sala = document.getElementById('equipo-sala').value;
    const alumnos = [...document.querySelectorAll('.alumno-input')]
        .map(i => i.value.trim()).filter(Boolean);
    if (!colegio || alumnos.length < 1) return;
    await fetch('/equipos/guardar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ colegio, alumnos, sala })
    });
    e.target.reset();
    cargarEquipos();
});

document.getElementById('input-csv').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    const form = new FormData();
    form.append('file', file);
    const res = await fetch('/equipos/csv', { method: 'POST', body: form });
    const data = await res.json();
    e.target.value = '';
    const msg = document.getElementById('csv-mensaje');
    msg.textContent = `CSV cargado — ${data.total} equipos en total`;
    setTimeout(() => msg.textContent = '', 4000);
    cargarEquipos();
});

function descargarPlantilla() {
    const cabecera = 'colegio,sala,alumno1,alumno2,alumno3,alumno4,alumno5,alumno6';
    const ejemplo = 'Colegio Ejemplo,Auditorio,Alumno Uno,Alumno Dos,Alumno Tres,,,';
    const blob = new Blob([cabecera + '\n' + ejemplo], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'plantilla_equipos.csv';
    a.click();
}

cargarEquipos();
</script>

{% endblock %}
